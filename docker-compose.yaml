services:
  otelmock:
    build: ./
    image: otelmock:latest
    healthcheck:
      test: ["CMD-SHELL", "curl -s -v http://localhost:4317/__admin/"]
      interval: 10s
      retries: 5
      start_period: 5s
      timeout: 10s
    deploy:
      mode: replicated
      replicas: 1
    networks:
      default:
        aliases:
          - grpc.example.com

  otel-collector:
    image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.151.0
    # image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.154.0
    deploy:
      resources:
        limits:
          memory: 200M
    extra_hosts:
      - "outpost.example.com:1.2.3.4"
    restart: unless-stopped
    command: [ "--config=/etc/otel-collector/config.yaml" ]
    user: 0:0
    volumes:
      - ./otel-collector.config.yaml:/etc/otel-collector/config.yaml
    ports:
      - 4317:4317
      - 4318:4318
    environment:
      - OTEL_COLLECTOR_HOST=otel-collector
      - OTEL_COLLECTOR_PORT_GRPC=4317
      - OTEL_COLLECTOR_PORT_HTTP=4318
      - GOMEMLIMIT=160MiB
    depends_on:
      otelmock:
        condition: service_healthy
